pipeline:
  seed: 42
  chunk:
    target_words: 220
    overlap_words: 40
  speech_backend:
    mode: nemo
    nemo:
      vad_model_path: models/nemo/vad/vad_multilingual_marblenet.nemo
      diarizer_config_path: models/nemo/diarizer/inference.yaml
      asr_model_path: models/nemo/asr/stt_en_conformer_ctc_medium.nemo
      allow_precomputed_outputs: false
      vad_command: python scripts/nemo_vad.py --audio {audio_path} --out-dir {output_dir}
        --meeting-id {meeting_id} --derive-from-diarization-rttm
      diarization_command: python scripts/nemo_diarize.py --audio {audio_path} --config
        {diarizer_config_path} --out-dir {output_dir} --meeting-id {meeting_id} --try-nemo-api
      asr_command: python scripts/nemo_asr.py --audio {audio_path} --model {asr_model_path}
        --diarization-json {diarization_json} --out-dir {output_dir} --meeting-id
        {meeting_id} --try-nemo-api --batch-size 32
  summarization_backend:
    mode: llama_cpp
    llama_cpp:
      model_path: models/llm/gguf/qwen2.5-7b-instruct-q5_k_m-00001-of-00002.gguf
      n_ctx: 12288
      n_gpu_layers: 24
      temperature: 0.05
      top_p: 1.0
      repeat_penalty: 1.05
  extraction_backend:
    mode: llama_cpp
    llama_cpp:
      model_path: models/llm/gguf/qwen2.5-7b-instruct-q5_k_m-00001-of-00002.gguf
      n_ctx: 12288
      n_gpu_layers: 24
      temperature: 0.0
      top_p: 1.0
      repeat_penalty: 1.05
paths:
  raw_audio_dir: data/rawa/ami/audio
  annotations_dir: data/rawa/ami/annotations
  staged_dir: data/staged/ami
  artifacts_dir: artifacts
  models_dir: models
runtime:
  offline: true
  fail_on_missing_models: true
  overwrite: true
  deterministic_mode: true
  fail_on_determinism_risks: false
  write_stage_trace: true
  write_preflight_audit: true
  fail_on_offline_violations: true
  include_nondeterministic_timings_in_manifest: false
